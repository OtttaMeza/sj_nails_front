services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - BACKEND_INTERNAL_URL=http://localhost:8080
      - JWT_SECRET=${JWT_SECRET}
      - JWT_COOKIE_NAME=${JWT_COOKIE_NAME:-sj_session}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-86400}
      - MOCK_AUTH=false
      - COOKIE_SECURE=false
      - NEXT_PUBLIC_APP_NAME=SJ Nails Admin
      - NEXT_PUBLIC_TIMEZONE=America/Bogota
